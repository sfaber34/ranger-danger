<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
    <title>TD Survival</title>
    <style>
      html, body { margin:0; padding:0; background:#0b0f1a; color:#eee; font-family: system-ui, sans-serif; overflow:hidden; height:100%; }
      #game { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
      canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
      #overlay { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(5,8,15,0.85); z-index:10; }
      #overlay.hidden { display:none; }
      .panel { background:#11172a; padding:24px 32px; border:2px solid #2a3760; border-radius:8px; text-align:center; min-width:280px; }
      .panel h1 { margin:0 0 8px; font-size:28px; letter-spacing:2px; color:#7cc4ff; }
      .panel p { margin:4px 0 16px; color:#aab; font-size:13px; }
      .panel button { margin-top:14px; background:#2a3760; color:#fff; border:none; padding:10px 20px; border-radius:4px; font-size:14px; cursor:pointer; }
      .panel button:hover { background:#3b4d84; }
      .hint { color:#556; font-size:11px; margin-top:14px; line-height:1.5; }
      /* Loading state */
      .panel.loading button, .panel.loading .hint, .panel.loading p { display:none; }
      .loader { display:none; margin:18px auto 0; }
      .panel.loading .loader { display:block; }
      .loader-spinner { width:32px; height:32px; border:3px solid #2a3760; border-top-color:#7cc4ff; border-radius:50%; margin:16px auto 0; animation:spin 0.8s linear infinite; }
      @keyframes spin { to{transform:rotate(360deg)} }
      .load-text { color:#7cc4ff; font-size:13px; margin-top:10px; letter-spacing:1px; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="overlay">
      <div class="panel">
        <h1>TD SURVIVAL</h1>
        <p>Survive the horde</p>
        <button id="startBtn">START</button>
        <div class="hint">WASD / Arrows to move &middot; auto-shoot nearby enemies (half speed while moving)<br/>1 = Arrow Tower &middot; 2 = Cannon Tower &middot; 3 = Wall &middot; Click to build &middot; X+Click to sell</div>
        <div class="loader">
          <div class="load-text">Generating world...</div>
          <div class="loader-spinner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
